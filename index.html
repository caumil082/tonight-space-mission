<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘밤 우주미션 (Tonight)</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="stars"></div>

  <header class="app-header">
    <div class="brand">🌌 오늘밤 우주미션 <span class="brand-en">Tonight</span></div>
    <div class="me">
      <span id="streak" class="streak-chip" hidden></span>
      <span id="badge" class="badge-chip">🌱 Lv.1</span>
      <span id="points" class="pts-chip">0 XP</span>
    </div>
  </header>

  <div id="data-note" class="data-note"></div>

  <nav class="tabs">
    <button class="tab active" data-tab="today">오늘</button>
    <button class="tab" data-tab="calendar">달력</button>
    <button class="tab" data-tab="mission">미션</button>
    <button class="tab" data-tab="journal">일지</button>
    <button class="tab" data-tab="quiz">퀴즈</button>
  </nav>

  <main id="view" class="view"><!-- 화면 내용이 여기에 그려집니다 --></main>

  <footer class="app-footer">
    데이터: 한국천문연구원 천문현상 정보 (공공데이터포털)
  </footer>

  <!-- 순서 중요: 데이터 → 도우미 → 관심/일지/미션/퀴즈 → 본체 -->
  <!-- ?v=숫자 는 코드 수정 후 브라우저가 옛 파일을 쓰지 않게 하는 표시(고치면 숫자 올리기) -->
  <script src="data/events.js?v=19"></script>
  <script src="js/data.js?v=19"></script>
  <script src="js/sky.js?v=19"></script>
  <script src="js/favorites.js?v=19"></script>
  <script src="js/journal.js?v=19"></script>
  <script src="js/backup.js?v=19"></script>
  <script src="js/missions.js?v=19"></script>
  <script src="js/quiz.js?v=19"></script>
  <script src="js/recommend.js?v=19"></script>
  <script src="js/app.js?v=19"></script>
</body>
</html>
